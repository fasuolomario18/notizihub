name: Auto Publisher — NotiziHub Multilingua

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      articles_per_niche:
        description: 'Articoli per nicchia per lingua (default: 1)'
        required: false
        default: '1'

jobs:
  genera-articoli:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Genera articoli in 6 lingue con Claude AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OUTPUT_DIR: './notizihub-site/output'
          ARTICLES_PER_NICHE: ${{ github.event.inputs.articles_per_niche || '1' }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: node index.js

      - name: Commit e push articoli generati
        run: |
          git config --local user.email "bot@notizihub.it"
          git config --local user.name "NotiziHub Bot"
          git add notizihub-site/output/
          git diff --staged --quiet || git commit -m "Auto: $(date '+%Y-%m-%d') — articoli multilingua (IT/EN/ES/DE/FR/PT)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
